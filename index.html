<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ENGEL Expert Academy" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2C2C2C" />
    <link rel="preconnect" href="https://hhqsarepwqhwbzxhxuhe.supabase.co" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>ENGEL expert academy</title>

    <!-- --safe-bottom startuje od 0; React hook useSafeArea() ustawi realną wartość po renderze -->
    <script>
      document.documentElement.style.setProperty('--safe-bottom', '0px');
    </script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: #2C2C2C;
        overscroll-behavior: none;
        overflow: hidden;
      }

      /* ── Splash screen ────────────────────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #2C2C2C;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.35s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        animation: splash-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      #splash-label {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 2px;
        color: rgba(255,255,255,0.45);
        text-transform: uppercase;
        animation: splash-fade 0.5s 0.15s ease both;
      }
      @keyframes splash-pop {
        from { opacity: 0; transform: scale(0.72); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-fade {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (min-width: 1025px) {
        html, body {
          width: 100vw;
          height: 100vh;
          background: #d0d0d0;
        }
        #root {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .app-container {
          width: 390px !important;
          height: 90vh !important;
          max-height: 844px !important;
          box-shadow: 0 8px 40px rgba(0,0,0,0.25) !important;
        }
        .app-container.admin-desktop {
          width: min(96vw, 1200px) !important;
          height: 90vh !important;
          max-height: 90vh !important;
          box-shadow: 0 8px 40px rgba(0,0,0,0.25) !important;
        }
        .admin-layout {
          display: flex !important;
          flex-direction: row !important;
          flex: 1 !important;
          min-height: 0 !important;
          overflow: hidden !important;
        }
        .admin-sidebar {
          display: flex !important;
          flex-direction: column !important;
          width: 180px !important;
          flex-shrink: 0 !important;
          border-right: 1px solid #D0D3D6 !important;
          background: #fff !important;
          padding: 12px 0 !important;
          overflow-y: auto !important;
        }
        .admin-sidebar-btn {
          display: flex !important;
          align-items: center !important;
          gap: 10px !important;
          padding: 12px 20px !important;
          border: none !important;
          background: none !important;
          cursor: pointer !important;
          text-align: left !important;
          width: 100% !important;
          font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
          font-size: 13px !important;
          font-weight: 600 !important;
          letter-spacing: 0.2px !important;
          transition: background 0.15s !important;
        }
        .admin-sidebar-btn:hover { background: #f5f5f5 !important; }
        .admin-sidebar-btn.active {
          border-left: 3px solid #7DC142 !important;
          background: #f0f9e8 !important;
        }
        .admin-sidebar-btn .tab-icon { font-size: 18px !important; }
        .admin-content-area {
          flex: 1 !important;
          min-width: 0 !important;
          overflow: hidden !important;
          display: flex !important;
          flex-direction: column !important;
        }
        .admin-top-tabs { display: none !important; }
      }

      @media (max-width: 1024px) {
        html, body {
          width: 100%;
          height: 100%;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          overflow: hidden;
        }
        #root {
          width: 100%;
          height: 100%;
          overflow: hidden;
        }
        .app-container {
          width: 100% !important;
          height: 100% !important;
          max-height: none !important;
          box-shadow: none !important;
          overflow: hidden;
        }
        .app-content { -webkit-overflow-scrolling: touch; }

        .tabbar {
          position: fixed !important;
          bottom: 0; left: 0; right: 0;
          padding-bottom: var(--safe-bottom, 0px);
          z-index: 100;
          background: #ffffff;
        }
        .contact-fab {
          position: fixed !important;
          bottom: calc(68px + var(--safe-bottom, 0px)) !important;
          right: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Splash — widoczny natychmiast, zanim React wystartuje -->
    <div id="splash">
      <img src="/pwa-192.png" alt="ENGEL Expert Academy" />
      <div id="splash-label">Expert Academy</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
